<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Mirrored wall shelf Blockbench lesson reference</title>
  <desc id="desc">A stylized café wall shelf with one bracket built on the right side and a mirrored bracket on the left side across the X center line.</desc>
  <rect width="900" height="420" fill="#fff8ed"/>
  <style>
    .label{font:700 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#322d28}
    .small{font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#6c6258}
    .mono{font:700 15px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#a64f1e}
    .axis{stroke:#d96d2b;stroke-width:4;stroke-dasharray:8 10;stroke-linecap:round}
    .shelf{fill:#9a5b2f;stroke:#5d2c28;stroke-width:5}
    .edge{fill:#6b3e28}
    .bracket{fill:#5d2c28;stroke:#351c18;stroke-width:4}
    .ghost{fill:#5d2c28;stroke:#351c18;stroke-width:4;opacity:.55}
    .jar{fill:#eec39a;stroke:#7f4d2f;stroke-width:4}
    .lid{fill:#8a8f8d;stroke:#4d5552;stroke-width:3}
    .arrow{stroke:#2f6f9e;stroke-width:4;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f6f9e"/>
    </marker>
  </defs>

  <text x="42" y="46" class="label">Lesson 14 target: mirror one bracket into a matching pair</text>
  <text x="42" y="72" class="small">Build on one side of the X center line. Mirror Modeling reflects it to the other side.</text>

  <line x1="450" y1="92" x2="450" y2="355" class="axis"/>
  <text x="462" y="116" class="mono">X = 0 mirror line</text>

  <g transform="translate(450 0)">
    <rect class="shelf" x="-250" y="176" width="500" height="42" rx="6"/>
    <rect class="edge" x="-250" y="214" width="500" height="16" rx="4"/>

    <g transform="translate(160 0)">
      <rect class="bracket" x="-18" y="218" width="36" height="100" rx="5"/>
      <rect class="bracket" x="-54" y="302" width="72" height="28" rx="5"/>
      <rect class="bracket" x="-38" y="252" width="86" height="22" rx="5" transform="rotate(-36 5 263)"/>
      <text x="-50" y="358" class="small">built side</text>
    </g>

    <g transform="translate(-160 0)">
      <rect class="ghost" x="-18" y="218" width="36" height="100" rx="5"/>
      <rect class="ghost" x="-18" y="302" width="72" height="28" rx="5"/>
      <rect class="ghost" x="-48" y="252" width="86" height="22" rx="5" transform="rotate(36 -5 263)"/>
      <text x="-58" y="358" class="small">mirrored side</text>
    </g>

    <g transform="translate(-62 0)">
      <rect class="jar" x="-24" y="125" width="48" height="52" rx="8"/>
      <rect class="lid" x="-28" y="112" width="56" height="16" rx="5"/>
    </g>
    <g transform="translate(62 0)">
      <rect class="jar" x="-24" y="125" width="48" height="52" rx="8"/>
      <rect class="lid" x="-28" y="112" width="56" height="16" rx="5"/>
    </g>
  </g>

  <path class="arrow" d="M602 326 C554 368 346 368 298 326"/>
  <text x="337" y="392" class="small">Apply Mirror Modeling when the reflected bracket looks right.</text>
</svg>
