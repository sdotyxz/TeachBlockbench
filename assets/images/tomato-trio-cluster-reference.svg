<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Tomato trio reference for Cluster selection mode</title>
  <desc id="desc">Three low-poly tomatoes merged into one mesh, with the left tomato highlighted as a selected connected cluster.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#f3ead9"/>
    </linearGradient>
    <linearGradient id="tomato" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e75b3f"/>
      <stop offset="0.55" stop-color="#d94a36"/>
      <stop offset="1" stop-color="#a9362a"/>
    </linearGradient>
    <linearGradient id="tomato2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f07349"/>
      <stop offset="0.6" stop-color="#d94a36"/>
      <stop offset="1" stop-color="#8f2e28"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="10" flood-color="#4b3724" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="920" height="520" rx="28" fill="url(#paper)"/>
  <g opacity=".28" stroke="#d8cdb8" stroke-width="1">
    <path d="M0 410H920M0 350H920M0 290H920M0 230H920M0 170H920"/>
    <path d="M120 0V520M240 0V520M360 0V520M480 0V520M600 0V520M720 0V520M840 0V520"/>
  </g>

  <g transform="translate(0 16)" filter="url(#shadow)">
    <ellipse cx="460" cy="390" rx="330" ry="34" fill="#7a4e24" opacity=".18"/>

    <g transform="translate(206 260)">
      <path d="M-74,-10 L-42,-78 L28,-90 L84,-34 L74,52 L0,94 L-72,46 Z" fill="url(#tomato2)" stroke="#7a261f" stroke-width="5" stroke-linejoin="round"/>
      <path d="M-43,-76 L-20,-24 L-74,-10" fill="#ec7954" opacity=".55"/>
      <path d="M28,-90 L22,-20 L84,-34" fill="#f28b61" opacity=".28"/>
      <path d="M-18,-91 L-2,-116 L14,-91 L44,-108 L36,-76 L68,-70 L36,-52 L2,-68 L-34,-51 L-28,-78 L-61,-78 Z" fill="#3f8f5b" stroke="#23603e" stroke-width="4" stroke-linejoin="round"/>
      <path d="M-96,-32 C-134,-12 -132,57 -91,84 C-44,115 42,116 91,74 C127,44 123,-19 93,-48" fill="none" stroke="#2f6f9e" stroke-width="10" stroke-linecap="round" stroke-dasharray="22 16"/>
      <circle cx="-82" cy="-30" r="9" fill="#2f6f9e"/>
      <text x="-108" y="-142" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#2f6f9e">Cluster selected</text>
    </g>

    <g transform="translate(452 238)">
      <path d="M-92,-2 L-53,-88 L24,-102 L96,-43 L88,54 L4,112 L-90,55 Z" fill="url(#tomato)" stroke="#7a261f" stroke-width="5" stroke-linejoin="round"/>
      <path d="M-53,-88 L-24,-18 L-92,-2" fill="#ed7956" opacity=".42"/>
      <path d="M24,-102 L22,-15 L96,-43" fill="#f28b61" opacity=".22"/>
      <path d="M-19,-101 L-2,-132 L17,-101 L51,-121 L42,-83 L78,-76 L42,-58 L3,-77 L-38,-56 L-31,-88 L-68,-88 Z" fill="#3f8f5b" stroke="#23603e" stroke-width="4" stroke-linejoin="round"/>
    </g>

    <g transform="translate(690 268)">
      <path d="M-76,-12 L-44,-79 L29,-88 L86,-30 L75,56 L-1,98 L-75,48 Z" fill="url(#tomato)" stroke="#7a261f" stroke-width="5" stroke-linejoin="round"/>
      <path d="M-44,-79 L-16,-25 L-76,-12" fill="#ed7956" opacity=".48"/>
      <path d="M29,-88 L23,-18 L86,-30" fill="#f28b61" opacity=".24"/>
      <path d="M-18,-90 L-2,-117 L16,-90 L47,-108 L38,-77 L70,-70 L37,-52 L3,-68 L-35,-50 L-28,-79 L-62,-78 Z" fill="#3f8f5b" stroke="#23603e" stroke-width="4" stroke-linejoin="round"/>
    </g>
  </g>

  <g font-family="Arial, sans-serif" fill="#5b574f">
    <text x="106" y="454" font-size="22">One merged mesh</text>
    <text x="346" y="454" font-size="22">Three disconnected face clusters</text>
    <text x="650" y="454" font-size="22">Click one face to grab one tomato</text>
  </g>
</svg>
