<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">Tomato bounce timing with squash and stretch</title>
  <desc id="desc">Five poses show a tomato squash at impact, return to normal, stretch near takeoff, hang at the top, and squash again at landing.</desc>
  <rect width="900" height="360" fill="#fff8ed"/>
  <style>
    .label{font:700 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#3b352e}
    .small{font:13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#71675b}
    .time{font:700 14px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#a64f1e}
    .line{stroke:#d8c9b5;stroke-width:3;stroke-linecap:round}
    .dot{fill:#fff;stroke:#d96d2b;stroke-width:4}
    .tomato{fill:#e63b35;stroke:#9e241f;stroke-width:5}
    .shade{fill:#c62c2a;opacity:.55}
    .stem{fill:#31994a;stroke:#1e6732;stroke-width:3}
    .tile{fill:#8a5a34;stroke:#5b321f;stroke-width:4}
  </style>
  <text x="42" y="48" class="label">Lesson 14 target: same bounce, clearer weight</text>
  <text x="42" y="73" class="small">The tomato does not need a rig. A few Scale keyframes can fake squash and stretch.</text>
  <path d="M110 258 C260 120 390 92 520 130 C660 170 735 225 790 258" fill="none" stroke="#e7d9c5" stroke-width="8" stroke-linecap="round" stroke-dasharray="8 14"/>
  <line x1="90" y1="284" x2="810" y2="284" class="line"/>

  <g transform="translate(112 238)">
    <ellipse cx="0" cy="36" rx="62" ry="12" fill="#000" opacity=".12"/>
    <rect class="tile" x="-54" y="40" width="108" height="20" rx="5"/>
    <ellipse class="tomato" cx="0" cy="-4" rx="54" ry="34"/>
    <path class="shade" d="M18 -34 C45 -17 47 18 18 28 C38 14 37 -14 18 -34Z"/>
    <path class="stem" d="M-18 -36 L0 -54 L18 -36 L6 -39 L0 -28 L-6 -39Z"/>
    <circle class="dot" cx="0" cy="72" r="9"/>
    <text x="-32" y="105" class="time">0.00s</text>
    <text x="-45" y="128" class="small">impact</text>
    <text x="-49" y="149" class="label">squash</text>
  </g>

  <g transform="translate(282 194)">
    <ellipse cx="0" cy="80" rx="48" ry="10" fill="#000" opacity=".08"/>
    <ellipse class="tomato" cx="0" cy="0" rx="42" ry="44"/>
    <path class="shade" d="M16 -38 C38 -19 38 22 14 36 C30 15 30 -17 16 -38Z"/>
    <path class="stem" d="M-16 -43 L0 -60 L16 -43 L6 -46 L0 -35 L-6 -46Z"/>
    <circle class="dot" cx="0" cy="116" r="9"/>
    <text x="-32" y="149" class="time">0.12s</text>
    <text x="-43" y="172" class="small">recover</text>
    <text x="-42" y="193" class="label">normal</text>
  </g>

  <g transform="translate(452 138)">
    <ellipse cx="0" cy="136" rx="40" ry="9" fill="#000" opacity=".06"/>
    <ellipse class="tomato" cx="0" cy="0" rx="34" ry="54"/>
    <path class="shade" d="M13 -47 C32 -24 32 30 11 45 C25 18 25 -22 13 -47Z"/>
    <path class="stem" d="M-15 -53 L0 -72 L15 -53 L5 -56 L0 -43 L-5 -56Z"/>
    <circle class="dot" cx="0" cy="172" r="9"/>
    <text x="-32" y="205" class="time">0.28s</text>
    <text x="-43" y="228" class="small">takeoff</text>
    <text x="-42" y="249" class="label">stretch</text>
  </g>

  <g transform="translate(622 104)">
    <ellipse cx="0" cy="170" rx="34" ry="8" fill="#000" opacity=".04"/>
    <ellipse class="tomato" cx="0" cy="0" rx="42" ry="44"/>
    <path class="shade" d="M16 -38 C38 -19 38 22 14 36 C30 15 30 -17 16 -38Z"/>
    <path class="stem" d="M-16 -43 L0 -60 L16 -43 L6 -46 L0 -35 L-6 -46Z"/>
    <circle class="dot" cx="0" cy="206" r="9"/>
    <text x="-32" y="239" class="time">0.50s</text>
    <text x="-29" y="262" class="small">top</text>
    <text x="-35" y="283" class="label">hang</text>
  </g>

  <g transform="translate(792 238)">
    <ellipse cx="0" cy="36" rx="62" ry="12" fill="#000" opacity=".12"/>
    <rect class="tile" x="-54" y="40" width="108" height="20" rx="5"/>
    <ellipse class="tomato" cx="0" cy="-4" rx="54" ry="34"/>
    <path class="shade" d="M18 -34 C45 -17 47 18 18 28 C38 14 37 -14 18 -34Z"/>
    <path class="stem" d="M-18 -36 L0 -54 L18 -36 L6 -39 L0 -28 L-6 -39Z"/>
    <circle class="dot" cx="0" cy="72" r="9"/>
    <text x="-32" y="105" class="time">1.00s</text>
    <text x="-36" y="128" class="small">loop</text>
    <text x="-49" y="149" class="label">squash</text>
  </g>
</svg>
